version: "3.9"

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: aianalytics
      POSTGRES_PASSWORD: aianalytics
      POSTGRES_DB: aianalytics
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aianalytics"]
      interval: 5s
      timeout: 3s
      retries: 5

  engine:
    build:
      context: ./engine
    ports:
      - "8080:8080"
    environment:
      PYTHONUNBUFFERED: "1"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  nextjs:
    build:
      context: .
      dockerfile: Dockerfile.next
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://aianalytics:aianalytics@postgres:5432/aianalytics
      DATA_ENGINE_URL: http://engine:8080
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-change-me-in-production}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      engine:
        condition: service_healthy

volumes:
  pgdata:
